spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/Identity
    username: postgres
    password: 1234

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  private-key: classpath:keys/private.pem
  public-key: classpath:keys/public.pem
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000